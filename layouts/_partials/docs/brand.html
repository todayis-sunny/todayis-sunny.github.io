<h2 class="book-brand">
  <a class="flex align-center" href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
    {{- with .Site.Params.BookLogo -}}
    <img src="{{ . | relURL }}" alt="{{ partial "docs/text/i18n" "Logo" }}" class="profile-logo" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 0.5rem;" />
    {{- end -}}
    <span>{{ .Site.Title }}</span>
  </a>
</h2>
